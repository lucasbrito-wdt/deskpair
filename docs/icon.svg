<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <!-- Glow for touch point -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Connection wave gradient -->
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle inner shadow -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="2"/>

  <!-- Monitor (main screen) -->
  <g transform="translate(68, 100)">
    <!-- Screen body -->
    <rect x="0" y="0" width="210" height="150" rx="14" ry="14" fill="#ffffff" fill-opacity="0.2" stroke="#ffffff" stroke-opacity="0.5" stroke-width="3"/>
    <!-- Screen content area -->
    <rect x="10" y="10" width="190" height="115" rx="6" ry="6" fill="#ffffff" fill-opacity="0.08"/>
    <!-- Stand -->
    <rect x="80" y="150" width="50" height="18" rx="2" ry="2" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="60" y="165" width="90" height="8" rx="4" ry="4" fill="#ffffff" fill-opacity="0.25"/>
  </g>

  <!-- Connection arcs (wireless waves) -->
  <g transform="translate(256, 230)" stroke="url(#wave)" fill="none" stroke-linecap="round">
    <path d="M 10,0 C 20,-15 30,-15 40,0" stroke-width="3" stroke-opacity="0.5"/>
    <path d="M 0,0 C 15,-25 45,-25 60,0" stroke-width="2.5" stroke-opacity="0.35"/>
    <path d="M -8,0 C 12,-35 58,-35 78,0" stroke-width="2" stroke-opacity="0.2"/>
  </g>

  <!-- Tablet (second screen) -->
  <g transform="translate(250, 210)">
    <!-- Tablet body -->
    <rect x="0" y="0" width="185" height="135" rx="16" ry="16" fill="#ffffff" fill-opacity="0.25" stroke="#ffffff" stroke-opacity="0.6" stroke-width="3"/>
    <!-- Screen content area -->
    <rect x="10" y="10" width="165" height="115" rx="8" ry="8" fill="#ffffff" fill-opacity="0.1"/>

    <!-- Touch point with ripple -->
    <circle cx="100" cy="65" r="22" fill="url(#glow)" opacity="0.4"/>
    <circle cx="100" cy="65" r="12" fill="#ffffff" fill-opacity="0.85"/>
    <!-- Touch ripple rings -->
    <circle cx="100" cy="65" r="18" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5"/>
    <circle cx="100" cy="65" r="28" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  </g>

  <!-- Small arrow connecting screens -->
  <g transform="translate(240, 260)" fill="#ffffff" fill-opacity="0.4">
    <polygon points="0,8 12,0 12,5 24,5 24,11 12,11 12,16"/>
  </g>
</svg>
