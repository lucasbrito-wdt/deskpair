name: Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    name: Build Tauri .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install frontend dependencies
        run: npm install

      - name: Install Tauri CLI
        run: npm install @tauri-apps/cli@latest

      - name: Build Tauri app (.deb only)
        run: npx tauri build --bundles deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: src-tauri/target/release/bundle/deb/*.deb

  build-flatpak:
    name: Build Flatpak
    needs: build-deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: flatpak/

      - name: Generate manifest
        run: |
          DEB_NAME=$(basename flatpak/*.deb)
          cat > flatpak/build-manifest.yml << YAML
          id: dev.deskpair.app
          runtime: org.gnome.Platform
          runtime-version: '48'
          sdk: org.gnome.Sdk
          command: deskpair
          finish-args:
            - --socket=wayland
            - --socket=fallback-x11
            - --device=dri
            - --share=ipc
            - --share=network
            - --filesystem=xdg-run/pipewire-0
            - --talk-name=org.gnome.Mutter.RemoteDesktop
            - --talk-name=org.gnome.Mutter.ScreenCast
            - --talk-name=org.freedesktop.portal.ScreenCast
            - --talk-name=org.freedesktop.portal.RemoteDesktop
            - --talk-name=org.freedesktop.Notifications
            - --talk-name=org.kde.StatusNotifierWatcher
            - --device=all
            - --filesystem=xdg-config/touchvnc-gnome:create
          modules:
            - name: deskpair
              buildsystem: simple
              sources:
                - type: file
                  path: ${DEB_NAME}
                - type: file
                  path: dev.deskpair.app.desktop
                - type: file
                  path: dev.deskpair.app.metainfo.xml
                - type: dir
                  path: icons
                  dest: icons
              build-commands:
                - ar -x *.deb
                - tar -xf data.tar.gz
                - install -Dm755 usr/bin/deskpair /app/bin/deskpair
                - install -Dm644 dev.deskpair.app.desktop /app/share/applications/dev.deskpair.app.desktop
                - install -Dm644 dev.deskpair.app.metainfo.xml /app/share/metainfo/dev.deskpair.app.metainfo.xml
                - install -Dm644 icons/dev.deskpair.app.svg /app/share/icons/hicolor/scalable/apps/dev.deskpair.app.svg
          YAML
          # Remove leading whitespace (heredoc indentation)
          sed -i 's/^          //' flatpak/build-manifest.yml

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/build-manifest.yml
          bundle: dev.deskpair.app.flatpak
          upload-artifact: true
          cache-key: flatpak-builder-${{ github.sha }}

  release:
    name: Create GitHub Release
    needs: [build-deb, build-flatpak]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: find . -type f -name "*.deb" -o -name "*.flatpak" | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deb-package/*.deb
            flatpak-app/*.flatpak
          generate_release_notes: true
