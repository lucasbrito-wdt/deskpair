name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the suggestion! Describe what you'd like to see in Deskpair.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Is it related to a frustration?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - Settings
        - Wizard / Onboarding
        - Server Control
        - Logs
        - System Tray
        - Flatpak / Packaging
        - Other
